<!DOCTYPE html>
<html>
<head>
    <title>OpsAgent</title>
    <style>
        body {
            font-family: Arial;
            max-width: 700px;
            margin: auto;
            padding: 30px;
            background: #f5f5f5;
        }
        h2 { text-align: center; }
        input {
            width: 75%;
            padding: 12px;
            font-size: 16px;
        }
        button {
            padding: 12px;
            font-size: 16px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }
        .box {
            background: white;
            padding: 15px;
            margin-top: 20px;
            border-radius: 8px;
        }
        .response {
            white-space: pre-wrap;
            font-size: 14px;
        }
    </style>
</head>
<body>

<h2>🤖 OpsAgent</h2>
<p>Type anything. OpsAgent will decide and execute.</p>

<input id="message" placeholder="Create a task for fixing login bug">
<button onclick="send()">Send</button>

<div class="box">
    <strong>Response:</strong>
    <div class="response" id="response"></div>
</div>

<script>
async function send() {
    const message = document.getElementById("message").value;

    const res = await fetch("/route", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ message })
    });

    const data = await res.json();

    let output = "";

    if (data.intent === "chat") {
        output = "🤖 OpsAgent:\n\n" + data.response;
    }
    else if (data.intent === "create_task") {
        output = "✅ Task Created!\n\n" +
                 "Title: " + data.task.title + "\n" +
                 "Link: " + data.task.url;
    }
    else if (data.intent === "analyze") {
        output = "📊 Analysis:\n\n" + data.analysis;
    }
    else {
        output = JSON.stringify(data, null, 2);
    }

    document.getElementById("response").innerText = output;
}
</script>

</body>
</html>
