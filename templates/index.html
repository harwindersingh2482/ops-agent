<!DOCTYPE html>
<html>
<head>
    <title>OpsAgent</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: auto; padding: 30px; background: #f5f5f5; }
        input { width: 70%; padding: 12px; }
        button { padding: 12px; background: black; color: white; }
        .box { background: white; padding: 15px; margin-top: 20px; border-radius: 8px; }
        .logs { font-size: 12px; color: gray; margin-top: 10px; }
    </style>
</head>
<body>

<h2>🤖 OpsAgent</h2>

<input id="message" placeholder="Type command">
<button onclick="send()">Send</button>

<div class="box">
    <div id="response"></div>
</div>

<div class="box">
    <strong>Activity Logs:</strong>
    <div id="logs" class="logs"></div>
</div>

<script>
async function send() {
    const message = document.getElementById("message").value;

    const res = await fetch("/route", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ message })
    });

    const data = await res.json();

    let output = "";

    if (data.intent === "chat") {
        output = "🤖 " + data.response;
    }

    else if (data.intent === "create_task") {
        output = "✅ Task Created: " + data.task.title;
    }

    else if (data.intent === "update_task") {

        if (data.result.status === "multiple_found") {
            output = "⚠️ Multiple tasks found:\n\n";

            data.result.options.forEach((task, i) => {
                output += (i+1) + ". " + task + "\n";
            });

            output += "\n👉 Type: select 1 / select 2";
        }

        else if (data.result.status === "moved") {
            output = "✅ Task Updated:\n" + data.result.title;
        }

        else {
            output = "⚠️ " + (data.result.message || "Something went wrong");
        }
    }

    else if (data.intent === "analyze") {
        output = "📊 " + data.analysis;
    }

    document.getElementById("response").innerText = output;

    if (data.logs) {
        document.getElementById("logs").innerText = data.logs.join("\n");
    }
}
</script>

</body>
</html>
